name: CI - Continuous Integration

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs of the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Frontend checks
  frontend-checks:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./web
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './web/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
        continue-on-error: false
      
      - name: TypeScript type check
        run: npx tsc --noEmit
      
      - name: Build production bundle
        run: npm run build
      
      - name: Check build size
        run: |
          echo "Build output size:"
          du -sh dist/
          echo "Detailed breakdown:"
          du -sh dist/* | sort -h
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: web/dist/
          retention-days: 7

  # Job 2: Backend checks
  backend-checks:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./api
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './api/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check for syntax errors
        run: node -c index.js
      
      - name: Verify dependencies
        run: npm list --depth=0

  # Job 3: Security audit
  security-audit:
    name: Security - Dependency Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Audit frontend dependencies
        working-directory: ./web
        run: |
          npm audit --audit-level=high || true
          npm audit --json > audit-frontend.json || true
      
      - name: Audit backend dependencies
        working-directory: ./api
        run: |
          npm audit --audit-level=high || true
          npm audit --json > audit-backend.json || true
      
      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: security-audits
          path: |
            web/audit-frontend.json
            api/audit-backend.json
          retention-days: 30

  # Job 4: Code quality checks
  code-quality:
    name: Code Quality - Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis
      
      - name: Check for TODO/FIXME comments
        run: |
          echo "Checking for TODO/FIXME comments..."
          grep -r "TODO\|FIXME" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" . || echo "No TODOs found"
      
      - name: Check for console.log statements
        run: |
          echo "Checking for console.log statements (should use proper logging)..."
          grep -r "console\.log" --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" web/src/ || echo "No console.log found"
      
      - name: Check file sizes
        run: |
          echo "Large files (>100KB):"
          find . -type f -size +100k -not -path "*/node_modules/*" -not -path "*/.git/*" -not -path "*/dist/*" | head -20

  # Job 5: Documentation check
  documentation-check:
    name: Documentation - Verify Completeness
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check required documentation files
        run: |
          required_files=(
            "README.md"
            "ONBOARDING.md"
            "API_DOCUMENTATION.md"
            "CONTRIBUTING.md"
            "DEPLOYMENT.md"
            "ARCHITECTURE.md"
          )
          
          missing_files=()
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              missing_files+=("$file")
            fi
          done
          
          if [ ${#missing_files[@]} -ne 0 ]; then
            echo "❌ Missing documentation files:"
            printf '%s\n' "${missing_files[@]}"
            exit 1
          else
            echo "✅ All required documentation files present"
          fi
      
      - name: Check for broken markdown links
        run: |
          echo "Checking markdown files for broken internal links..."
          # This is a simple check, could be enhanced with markdown-link-check
          find . -name "*.md" -not -path "*/node_modules/*" -exec echo "Checking: {}" \;

  # Job 6: Build summary
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [frontend-checks, backend-checks, security-audit, code-quality, documentation-check]
    if: always()
    
    steps:
      - name: Check job statuses
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Checks | ${{ needs.frontend-checks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Checks | ${{ needs.backend-checks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.documentation-check.result }} |" >> $GITHUB_STEP_SUMMARY
      
      - name: Fail if any job failed
        if: |
          needs.frontend-checks.result == 'failure' ||
          needs.backend-checks.result == 'failure' ||
          needs.code-quality.result == 'failure' ||
          needs.documentation-check.result == 'failure'
        run: exit 1

