name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  pr-validation:
    name: Validate PR
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check PR title format
        uses: actions/github-script@v8
        with:
          script: |
            const title = context.payload.pull_request.title;
            const validPrefixes = ['feat', 'fix', 'docs', 'style', 'refactor', 'test', 'chore'];
            const pattern = new RegExp(`^(${validPrefixes.join('|')})(\(.+\))?: .+`);
            
            if (!pattern.test(title)) {
              core.setFailed(
                `PR title "${title}" doesn't follow conventional commits format.\n` +
                `Expected format: <type>(<scope>): <description>\n` +
                `Valid types: ${validPrefixes.join(', ')}\n` +
                `Example: feat(dashboard): add CSV export button`
              );
            }
      
      - name: Check PR description
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            
            if (body.length < 20) {
              core.setFailed(
                'PR description is too short. Please provide:\n' +
                '- What this PR does\n' +
                '- Why these changes are needed\n' +
                '- How to test the changes'
              );
            }
      
      - name: Check for large file additions
        run: |
          echo "Checking for large files..."
          git diff --name-only origin/${{ github.base_ref }}...HEAD | while read file; do
            if [ -f "$file" ]; then
              size=$(du -k "$file" | cut -f1)
              if [ $size -gt 1000 ]; then
                echo "⚠️ Warning: $file is ${size}KB (>1MB)"
              fi
            fi
          done
      
      - name: Check for sensitive data
        run: |
          echo "Checking for potential sensitive data..."
          
          # Check for common patterns
          patterns=(
            "password"
            "api_key"
            "secret"
            "token"
            "private_key"
          )
          
          found=false
          for pattern in "${patterns[@]}"; do
            if git diff origin/${{ github.base_ref }}...HEAD | grep -i "$pattern" | grep -v "password.*example\|api_key.*placeholder"; then
              echo "⚠️ Warning: Found potential sensitive data pattern: $pattern"
              found=true
            fi
          done
          
          if [ "$found" = true ]; then
            echo "Please review the above findings to ensure no sensitive data is committed."
          fi
      
      - name: Generate PR summary
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            
            const comment = `## 🔍 PR Validation Summary
            
            | Check | Status |
            |-------|--------|
            | Title Format | ✅ Valid |
            | Description | ✅ Present |
            | Files Changed | ${pr.changed_files} |
            | Additions | +${pr.additions} |
            | Deletions | -${pr.deletions} |
            
            ### Next Steps
            - Wait for CI checks to complete
            - Request review from team members
            - Address any feedback
            - Ensure all checks pass before merging
            `;
            
            // Only comment on first PR open, not on every sync
            if (context.payload.action === 'opened') {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  label-pr:
    name: Auto-label PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Label by changed files
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = [];
            
            // Fetch changed files
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });
            
            const changedFiles = files.data.map(f => f.filename);
            
            // Determine labels based on files
            if (changedFiles.some(f => f.startsWith('web/src/pages/'))) {
              labels.push('frontend');
            }
            if (changedFiles.some(f => f.startsWith('api/'))) {
              labels.push('backend');
            }
            if (changedFiles.some(f => f.endsWith('.md'))) {
              labels.push('documentation');
            }
            if (changedFiles.some(f => f.includes('test') || f.includes('.test.'))) {
              labels.push('tests');
            }
            if (changedFiles.some(f => f.startsWith('.github/workflows/'))) {
              labels.push('ci/cd');
            }
            
            // Add size label
            const totalChanges = pr.additions + pr.deletions;
            if (totalChanges < 50) {
              labels.push('size/small');
            } else if (totalChanges < 200) {
              labels.push('size/medium');
            } else {
              labels.push('size/large');
            }
            
            // Apply labels
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: labels
              });
            }

